name: BlueskyModeration
targets:
  BlueskyModeration:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - App
      - Features
      - Services
      - Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.blueskymoderation.BlueskyModeration
        INFOPLIST_FILE: Info.plist
        CODE_SIGN_IDENTITY: ""
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: 1
        SWIFT_VERSION: "5.0"
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: Bluesky Moderation
        CFBundleShortVersionString: 1.0.0
        CFBundleVersion: 1
        UILaunchScreen:
          UILaunchScreen: {}
        UIRequiredDeviceCapabilities:
          - armv7
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
  BlueskyModerationTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Tests
    dependencies:
      - target: BlueskyModeration
    settings:
      base:
        SWIFT_VERSION: "5.0"
        TEST_TARGET_NAME: BlueskyModeration
        GENERATE_INFOPLIST_FILE: YES
