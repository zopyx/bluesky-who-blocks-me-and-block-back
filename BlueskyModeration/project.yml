name: BlueskyModeration
options:
  bundleIdPrefix: com.ajung
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
settings:
  base:
    PRODUCT_NAME: BlueskyModeration
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""
targets:
  BlueskyModeration:
    type: application
    platform: iOS
    sources:
      - Sources
      - Assets/Assets.xcassets
      - Sources/App/PrivacyInfo.xcprivacy
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Rulyx
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
        INFOPLIST_KEY_NSFaceIDUsageDescription: "Rulyx uses Face ID to protect your accounts and moderation data."
        PRODUCT_BUNDLE_IDENTIFIER: com.ajung.BlueskyModeration
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    preBuildScripts:
      - name: SwiftLint
        script: |
          export PATH="$PATH:/opt/homebrew/bin"
          if which swiftlint >/dev/null; then
            swiftlint
          else
            echo "warning: SwiftLint not installed, download from https://github.com/realm/SwiftLint"
          fi
      - name: SwiftFormat
        script: |
          export PATH="$PATH:/opt/homebrew/bin"
          if which swiftformat >/dev/null; then
            swiftformat --lint --lenient .
          else
            echo "warning: SwiftFormat not installed, download from https://github.com/nicklockwood/SwiftFormat"
          fi
    scheme:
      testTargets:
        - BlueskyModerationTests
        - BlueskyModerationUITests
  BlueskyModerationTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    dependencies:
      - target: BlueskyModeration
    settings:
      base:
        PRODUCT_NAME: BlueskyModerationTests
        PRODUCT_BUNDLE_IDENTIFIER: com.ajung.BlueskyModerationTests
        GENERATE_INFOPLIST_FILE: YES
  BlueskyModerationUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - UITests
    dependencies:
      - target: BlueskyModeration
    settings:
      base:
        PRODUCT_NAME: BlueskyModerationUITests
        PRODUCT_BUNDLE_IDENTIFIER: com.ajung.BlueskyModerationUITests
        GENERATE_INFOPLIST_FILE: YES
