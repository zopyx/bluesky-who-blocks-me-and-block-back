name: BlueskyModeration
options:
  bundleIdPrefix: com.ajung
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    PRODUCT_NAME: BlueskyModeration
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""
targets:
  BlueskyModeration:
    type: application
    platform: iOS
    sources:
      - Sources
      - Assets/Assets.xcassets
      - Sources/App/PrivacyInfo.xcprivacy
    info:
      path: Sources/App/Info.plist
      properties:
        CFBundleDisplayName: RULYX
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIApplicationSupportsIndirectInputEvents: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        NSFaceIDUsageDescription: "Rulyx uses Face ID to protect your accounts and moderation data."
        PushNotificationsEnabled: true
        BskyPushServiceDID: did:web:api.bsky.app
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ajung.BlueskyModeration
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    scheme:
      testTargets:
        - BlueskyModerationTests
        - BlueskyModerationUITests
  BlueskyModerationTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    dependencies:
      - target: BlueskyModeration
    settings:
      base:
        PRODUCT_NAME: BlueskyModerationTests
        PRODUCT_BUNDLE_IDENTIFIER: com.ajung.BlueskyModerationTests
        GENERATE_INFOPLIST_FILE: YES
  BlueskyModerationUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - UITests
    dependencies:
      - target: BlueskyModeration
    settings:
      base:
        PRODUCT_NAME: BlueskyModerationUITests
        PRODUCT_BUNDLE_IDENTIFIER: com.ajung.BlueskyModerationUITests
        GENERATE_INFOPLIST_FILE: YES
