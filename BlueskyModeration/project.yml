name: BlueskyModeration
options:
  bundleIdPrefix: com.ajung
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    PRODUCT_NAME: BlueskyModeration
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""
targets:
  BlueskyModeration:
    type: application
    platform: iOS
    sources:
      - Sources
      - Assets/Assets.xcassets
      - Sources/App/PrivacyInfo.xcprivacy
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        PRODUCT_BUNDLE_IDENTIFIER: com.ajung.BlueskyModeration
        TARGETED_DEVICE_FAMILY: 1
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    scheme:
      testTargets:
        - BlueskyModerationTests
        - BlueskyModerationUITests
  BlueskyModerationTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    dependencies:
      - target: BlueskyModeration
    settings:
      base:
        PRODUCT_NAME: BlueskyModerationTests
        PRODUCT_BUNDLE_IDENTIFIER: com.ajung.BlueskyModerationTests
        GENERATE_INFOPLIST_FILE: YES
  BlueskyModerationUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - UITests
    dependencies:
      - target: BlueskyModeration
    settings:
      base:
        PRODUCT_NAME: BlueskyModerationUITests
        PRODUCT_BUNDLE_IDENTIFIER: com.ajung.BlueskyModerationUITests
        GENERATE_INFOPLIST_FILE: YES
